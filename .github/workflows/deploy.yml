name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Framework ───────────────────────────────────────────────────────────
      - name: Install root dependencies
        run: npm install

      - name: Build VeloraCSS framework
        run: npm run build

      # ── Playground (Vite) ────────────────────────────────────────────────────
      - name: Build playground
        run: npx vite build
        env:
          NODE_ENV: production

      # ── Next.js demo ─────────────────────────────────────────────────────────
      - name: Install Next.js demo dependencies
        run: npm install
        working-directory: nextjs-demo

      - name: Build Next.js demo (static export)
        run: npm run build
        working-directory: nextjs-demo
        env:
          NODE_ENV: production

      # ── Assemble output ──────────────────────────────────────────────────────
      - name: Assemble GitHub Pages output
        run: |
          mkdir -p gh-pages/playground
          cp -r nextjs-demo/out/. gh-pages/
          cp -r playground-dist/. gh-pages/playground/
          touch gh-pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./gh-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
